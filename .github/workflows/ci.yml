name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Vet
        run: go vet ./...

      - name: Build
        run: CGO_ENABLED=0 go build -ldflags "-s -w" -o simpledeploy .

      - name: Test
        run: go test -p=1 -count=1 ./...
        timeout-minutes: 15

name: Race Detector

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Run tests with race detector
        run: go test -race -p=1 -count=1 ./...
        timeout-minutes: 30

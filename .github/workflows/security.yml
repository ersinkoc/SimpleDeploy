name: Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Run daily at 02:00 UTC
    - cron: '0 2 * * *'

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Run gosec security scanner
        uses: securego/gosec@v2.22.0
        with:
          # G204 (subprocess with variables) and G304 (file path traversal) are
          # expected false positives for a deployment tool that necessarily
          # executes docker/git commands and constructs filesystem paths.
          args: '-severity high -confidence medium -exclude=G204,G304 ./...'
